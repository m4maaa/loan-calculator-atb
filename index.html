<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<title>ระบบคำนวณเงินกู้ อทบ.</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="watermark"></div>

<header>

<img src="Logo.png" class="logo">

<div class="title">

<h1>ระบบคำนวณเงินกู้ อทบ.</h1>
<p>Army Welfare Loan Calculator</p>

</div>

</header>


<div class="container">

<div class="layout">

<div class="form-area">

<h2>ข้อมูลรายได้</h2>

<label>เดือน</label>
<select id="month">

<option>มกราคม</option>
<option>กุมภาพันธ์</option>
<option>มีนาคม</option>
<option>เมษายน</option>
<option>พฤษภาคม</option>
<option>มิถุนายน</option>
<option>กรกฎาคม</option>
<option>สิงหาคม</option>
<option>กันยายน</option>
<option>ตุลาคม</option>
<option>พฤศจิกายน</option>
<option>ธันวาคม</option>

</select>

<label>เงินเดือน</label>
<input type="text" id="salary" onblur="formatMoney(this)">

<label>รวมรับ</label>
<input type="text" id="receive" onblur="formatMoney(this)">

<label>รวมหัก</label>
<input type="text" id="deduct" onblur="formatMoney(this)">

<p id="remainNow"></p>


<h2>เหตุผลการกู้</h2>

<select id="reason">

<option value="">-- เลือกเหตุผล --</option>
<option>เพื่อสร้าง/ต่อเติม/ซ่อมแซมที่อยู่อาศัย</option>
<option>เพื่อซื้อ/ไถ่ถอนที่ดิน</option>
<option>เพื่อการเกษตร</option>
<option>เพื่อหมุนเวียน/ต่อยอดธุรกิจ</option>
<option>เพื่อใช้จ่ายภายในครอบครัว</option>
<option>เพื่อชำระหนี้สินนอกระบบ</option>
<option>เพื่อชำระหนี้สินในระบบ (ปรากฏในสลิปเงินเดือน)</option>

</select>


<div id="oldDebtBox">

<label>หนี้เดิมผ่อนต่อเดือน</label>
<input type="text" id="oldDebt" onblur="formatMoney(this)">

</div>


<h2>หนี้ใหม่</h2>

<label>ยอดกู้ใหม่</label>
<input type="text" id="loan" onblur="formatMoney(this)">

<label>จำนวนงวด</label>
<input type="number" id="installment">

<p id="installmentError"></p>

<label>ยอดผ่อนต่อเดือน</label>
<input type="text" id="newPay" onblur="formatMoney(this)">



<div class="buttons">

<button id="calcBtn" onclick="calculate()" disabled>
คำนวณ
</button>

<button class="reset" onclick="resetForm()">
ตั้งค่าใหม่
</button>

<button class="print" onclick="printPage()">
ปริ้น
</button>

</div>

</div>



<div class="result-area">

<h2 class="rule-title">หลักเกณฑ์</h2>

<div class="rule-block">

<p class="rule-label">
เกณฑ์ 1 ใน 3 ของรายได้
</p>

<p class="rule-desc">
(หลังกู้ต้องเหลือไม่น้อยกว่านี้)
</p>

<p id="oneThird" class="rule-value"></p>

</div>


<div class="rule-block">

<p class="rule-label">
เงินคงเหลือหลังกู้
</p>

<p class="rule-desc">
(รายได้สุทธิหลังหักหนี้ใหม่)
</p>

<p id="remainAfter" class="rule-value"></p>

</div>


<hr>

<h2 class="result-title">ผลลัพธ์</h2>

<p id="ruleThird"></p>
<p id="ruleFive"></p>

<h3 id="finalResult"></h3>

</div>

</div>

</div>


<footer>

<span id="datetime"></span>

</footer>

<script src="script.js"></script>

</body>
</html>
