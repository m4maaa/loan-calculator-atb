<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบคำนวณเงินกู้ อทบ.</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>ระบบคำนวณเงินกู้ อทบ.</h1>

<p class="center">
ตรวจสอบสลิปเงินเดือนผ่าน
<a href="https://e-army.rta.mi.th/V2/#" target="_blank">e-Army</a>
</p>

<div class="layout">

<div class="form-area">

<h2>ข้อมูลรายได้</h2>

<label>เดือน</label>
<select id="month">
<option>มกราคม</option>
<option>กุมภาพันธ์</option>
<option>มีนาคม</option>
<option>เมษายน</option>
<option>พฤษภาคม</option>
<option>มิถุนายน</option>
<option>กรกฎาคม</option>
<option>สิงหาคม</option>
<option>กันยายน</option>
<option>ตุลาคม</option>
<option>พฤศจิกายน</option>
<option>ธันวาคม</option>
</select>

<label>เงินเดือน</label>
<input type="text" id="salary" onblur="formatInput(this)">

<label>รวมรับ</label>
<input type="text" id="receive" onblur="formatInput(this)">

<label>รวมหัก</label>
<input type="text" id="deduct" onblur="formatInput(this)">

<p id="remainNow"></p>

<h2>เหตุผลการกู้</h2>

<select id="reason">
<option>เพื่อสร้าง/ต่อเติม/ซ่อมแซมที่อยู่อาศัย</option>
<option>เพื่อซื้อ/ไถ่ถอนที่ดิน</option>
<option>เพื่อการเกษตร</option>
<option>เพื่อหมุนเวียน/ต่อยอดธุรกิจ</option>
<option>เพื่อใช้จ่ายภายในครอบครัว</option>
<option>เพื่อชำระหนี้สินนอกระบบ</option>
<option>เพื่อชำระหนี้สินในระบบ (ปรากฏในสลิปเงินเดือน)</option>
</select>

<div id="oldDebtBox" style="display:none">

<label>หนี้เดิมผ่อน/ต่อเดือน</label>
<input type="text" id="oldDebt" onblur="formatInput(this)">

</div>

<h2>ข้อมูลหนี้ใหม่</h2>

<label>ยอดกู้ใหม่</label>
<input type="text" id="loan" onblur="formatInput(this)">

<label>จำนวนงวด</label>
<input type="number" id="installment">

<p id="installmentError"></p>

<label>
จำนวนผ่อนต่อเดือน
<a href="http://www.oomsub.com/calculate.aspx" target="_blank">
(คำนวณยอด)
</a>
</label>

<input type="text" id="newPay" onblur="formatInput(this)">

<button onclick="calculate()">คำนวณ</button>

</div>


<div class="result-area">

<h2>ผลลัพธ์</h2>

<p>1 ใน 3 ของรายได้</p>
<p id="oneThird"></p>

<p>หลังกู้เหลือ</p>
<p id="remainAfter"></p>

<p id="ruleThird"></p>
<p id="ruleFive"></p>

<h3 id="finalResult"></h3>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
