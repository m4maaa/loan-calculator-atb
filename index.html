<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบคำนวณเงินกู้ อทบ.</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="watermark"></div>

<header>

<img src="logo.png" class="logo">

<div class="title">
<h1>ระบบคำนวณเงินกู้ อทบ.</h1>
<p>Army Welfare Loan Calculator</p>
</div>

</header>

<div class="container">

<div class="layout">

<div class="form-area">

<h2>ข้อมูลรายได้</h2>

<label>เดือน</label>
<select id="month">
<option>มกราคม</option>
<option>กุมภาพันธ์</option>
<option>มีนาคม</option>
<option>เมษายน</option>
<option>พฤษภาคม</option>
<option>มิถุนายน</option>
<option>กรกฎาคม</option>
<option>สิงหาคม</option>
<option>กันยายน</option>
<option>ตุลาคม</option>
<option>พฤศจิกายน</option>
<option>ธันวาคม</option>
</select>

<label>เงินเดือน</label>
<input type="text" id="salary" onkeyup="formatLive(this)">

<label>รวมรับ</label>
<input type="text" id="receive" onkeyup="formatLive(this)">

<label>รวมหัก</label>
<input type="text" id="deduct" onkeyup="formatLive(this)">

<p id="remainNow"></p>

<h2>เหตุผลการกู้</h2>

<select id="reason">

<option>เพื่อสร้าง/ต่อเติม/ซ่อมแซมที่อยู่อาศัย</option>
<option>เพื่อซื้อ/ไถ่ถอนที่ดิน</option>
<option>เพื่อการเกษตร</option>
<option>เพื่อหมุนเวียน/ต่อยอดธุรกิจ</option>
<option>เพื่อใช้จ่ายภายในครอบครัว</option>
<option>เพื่อชำระหนี้สินนอกระบบ</option>
<option>เพื่อชำระหนี้สินในระบบ (ปรากฏในสลิปเงินเดือน)</option>

</select>

<div id="oldDebtBox">

<label>หนี้เดิมผ่อนต่อเดือน</label>
<input type="text" id="oldDebt" onkeyup="formatLive(this)">

</div>

<h2>หนี้ใหม่</h2>

<label>ยอดกู้ใหม่</label>
<input type="text" id="loan" onkeyup="formatLive(this)">

<label>จำนวนงวด</label>
<input type="number" id="installment">

<p id="installmentError"></p>

<label>
ยอดผ่อนต่อเดือน
<a href="http://www.oomsub.com/calculate.aspx" target="_blank">(คำนวณ)</a>
</label>

<input type="text" id="newPay" onkeyup="formatLive(this)">

<div class="button-group">

<button onclick="calculate()">คำนวณ</button>
<button class="reset" onclick="resetForm()">Reset</button>
<button class="print" onclick="printPage()">Print</button>

</div>

</div>


<div class="result-area">

<h2>ผลลัพธ์</h2>

<p>1 ใน 3 ของรายได้</p>
<p id="oneThird"></p>

<p>เงินเหลือหลังกู้</p>
<p id="remainAfter"></p>

<p id="ruleThird"></p>
<p id="ruleFive"></p>

<h3 id="finalResult"></h3>

</div>

</div>

</div>

<footer>

<span id="datetime"></span>

</footer>

<script src="script.js"></script>

</body>
</html>
