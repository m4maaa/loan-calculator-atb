<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Loan Calculator ATB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<title>ระบบคำนวณเงินกู้ อทบ.</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<img src="logo.png" class="logo" crossorigin="anonymous">
<div>
<h1>ระบบคำนวณเงินกู้ อทบ.</h1>
<p>Army Welfare Loan Calculator</p>
</div>
<div id="datetime"></div>
</header>

<section class="card">

<h2>ข้อมูลกำลังพล</h2>

<div class="row">

<select id="rank">
<option value="">ยศ</option>
<option>สิบตรี</option>
<option>สิบโท</option>
<option>สิบเอก</option>
<option>จ่าสิบตรี</option>
<option>จ่าสิบโท</option>
<option>จ่าสิบเอก</option>
<option>ร้อยตรี</option>
<option>ร้อยโท</option>
<option>ร้อยเอก</option>
<option>พันตรี</option>
<option>พันโท</option>
<option>พันเอก</option>

</select>

<input id="firstname" placeholder="ชื่อ">

<input id="lastname" placeholder="สกุล">

<select id="unit">

<option value="">สังกัด</option>

<option>สง.ผบช.</option>
<option>ฝกพ.ฯ</option>
<option>ฝขว.ฯ</option>
<option>ฝยก.ฯ/สส.</option>
<option>ฝกบ.ฯ</option>
<option>ฝกร.ฯ</option>
<option>ฝกง.ฯ</option>
<option>ชุดซักถาม.ฯ</option>
<option>ชกพ.ฯ</option>
<option>4301</option>
<option>4302</option>
<option>4303</option>
<option>4304</option>
<option>4305</option>
<option>4306</option>
<option>4307</option>
<option>4308</option>
<option>4309</option>
<option>4310</option>
<option>4311</option>
<option>4312</option>
<option>4313</option>
<option>4314</option>
<option>4315</option>
<option>4316</option>

</select>

</section>

<section class="card">

<h2>ข้อมูลรายได้</h2>

<div class="row incomeRow">

<input id="salary" class="numInput" placeholder="เงินเดือน">

<select id="month"></select>

</div>

<div class="row">
<input id="income" class="numInput" placeholder="รวมรับ">
<input id="deduct" class="numInput" placeholder="รวมหัก">
</div>

<div class="incomeSummary">

<div>
ยอด 1 ใน 3 : <span id="oneThird">0.0</span> บาท
</div>

<div>
เหลือรับ : <span id="remain">0.0</span> บาท
</div>

</div>

</section>


<section class="card">

<h2>เหตุผลการกู้</h2>

<select id="reason">
<option value="">-- เลือกเหตุผล --</option>
<option>เพื่อสร้าง/ต่อเติม/ซ่อมแซมที่อยู่อาศัย</option>
<option>เพื่อซื้อ/ไถ่ถอนที่ดิน</option>
<option>เพื่อการเกษตร</option>
<option>เพื่อหมุนเวียน/ต่อยอดธุรกิจ</option>
<option>เพื่อชำระหนี้สินส่วนอื่น</option>
<option value="system">กู้ทับ อทบ. เดิม</option>
</select>

<div class="row hidden" id="debtRow">
<input id="oldDebt" class="numInput" placeholder="หนี้เดิม/เดือน">
</div>

<input id="loan" class="loanInput" placeholder="ยอดเงินกู้ใหม่">

<div class="row">
<input id="installment" class="numInput" placeholder="ยอดผ่อนต่อเดือน">

<select id="period">
<option selected>จำนวนงวด</option>
<option>48</option>
<option>60</option>
<option>72</option>
<option>84</option>
<option>96</option>
<option>108</option>
<option>120</option>
</select>
</div>

<div class="remainAfter">
เหลือรับหลังกู้ : <span id="remainAfter">0.0</span> บาท /เดือน
</div>

</section>

<section class="card rules">

<h2>หลักเกณฑ์</h2>

<p id="rule1">รายได้มากกว่า 1 ใน 3</p>
<p id="rule2">เหลือรับมากกว่า 5,000 บาท/เดือน</p>

<div class="result" id="result"></div>

</section>

<div class="buttonBar">

<button onclick="resetForm()" class="resetBtn" id="resetBtn">รีเซ็ต</button>

<button onclick="saveImage()" class="saveBtn" id="saveBtn">บันทึกรูป</button>

<a href="https://e-army.rta.mi.th/V2/#" target="_blank" class="linkBtn">
e-army
</a>

<a href="http://www.oomsub.com/calculate.aspx" target="_blank" class="linkBtn">
คำนวณยอดเงิน อทบ.
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
