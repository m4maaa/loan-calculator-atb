<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คำนวณเงินกู้ อทบ.</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>ระบบคำนวณเงินกู้ อทบ.</h1>

<p>
ตรวจสอบสลิปเงินเดือนผ่าน  
<a href="https://e-army.rta.mi.th/V2/#" target="_blank">
ระบบ e-Army
</a>
</p>

<div class="main-grid">

<!-- ฝั่งซ้าย รายได้ -->

<div class="income-box">

<h2>รายได้</h2>

<label>เงินเดือน</label>
<input type="number" id="salary">

<label>พ.ส.ร. ขั้น 1</label>
<input type="number" id="psr1">

<label>พ.ส.ร. ขั้น 2</label>
<input type="number" id="psr2">

<label>พ.ส.ร. ขั้น 3</label>
<input type="number" id="psr3">

<label>พ.ส.ร. ขั้น 4</label>
<input type="number" id="psr4">

<label>รายได้อื่นๆ (พ.ส.ร.พิเศษ ฯลฯ)</label>
<input type="number" id="other">

<button onclick="calculate()">คำนวณ</button>

<p>รวมรายได้ : <span id="totalIncome">0</span></p>

</div>

<!-- ฝั่งขวา -->

<div class="right-box">

<div class="deduct-box">

<h2>รายการหัก</h2>

<label>เดือนล่าสุดรวมหัก</label>
<input type="number" id="deduct">

<p>เหลือรับ : <span id="remainNow">0</span></p>

</div>

<div class="debt-box">

<h2>กรณีปิดหนี้ในสลิป</h2>

<label>รายการหนี้</label>
<input type="text" id="debtName">

<label>ยอดหักรายเดือน</label>
<input type="number" id="debtAmount">

</div>

</div>

</div>

<!-- ผลลัพธ์ -->

<div class="result-box" id="resultBox">

<h2>ผลการประเมิน</h2>

<p>1 ใน 3 ของรายได้ : <span id="oneThird"></span></p>

<p>หลังกู้คงเหลือ : <span id="remainAfter"></span></p>

<h3 id="status"></h3>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
