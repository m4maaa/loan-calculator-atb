<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<title>ระบบคำนวณเงินกู้ อทบ.</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<img src="logo.png" class="logo">
<div>
<h1>ระบบคำนวณเงินกู้ อทบ.</h1>
<p>Army Welfare Loan Calculator</p>
</div>
</header>

<section class="card">

<h2>ข้อมูลรายได้</h2>

<div class="row incomeRow">

<input id="salary" class="numInput" placeholder="เงินเดือน">

<select id="month"></select>

</div>

<div class="row">
<input id="income" class="numInput" placeholder="รวมรับ">
<input id="deduct" class="numInput" placeholder="รวมหัก">
</div>

<div class="remainBox">
เหลือรับ : <span id="remain">0.0</span>
</div>

</section>


<section class="card">

<h2>เหตุผลการกู้</h2>

<select id="reason">
<option value="">-- เลือกเหตุผล --</option>
<option>เพื่อสร้าง/ต่อเติม/ซ่อมแซมที่อยู่อาศัย</option>
<option>เพื่อซื้อ/ไถ่ถอนที่ดิน</option>
<option>เพื่อการเกษตร</option>
<option>เพื่อหมุนเวียน/ต่อยอดธุรกิจ</option>
<option>เพื่อชำระหนี้สินนอกระบบ</option>
<option value="system">เพื่อชำระหนี้สินในระบบ</option>
</select>

<div class="row hidden" id="debtRow">
<input id="oldDebt" class="numInput" placeholder="หนี้เดิม/เดือน">
</div>

<input id="loan" class="loanInput" placeholder="ยอดเงินกู้ใหม่">

<div class="row">
<input id="installment" class="numInput" placeholder="ยอดผ่อนต่อเดือน">

<select id="period">
<option>24</option>
<option>36</option>
<option>48</option>
<option>60</option>
<option>72</option>
<option>84</option>
<option>96</option>
<option>108</option>
<option selected>120</option>
<option>240</option>
</select>
</div>

</section>


<section class="card rules">

<h2>หลักเกณฑ์</h2>

<p id="rule1">รายได้มากกว่า 1 ใน 3</p>

<p id="rule2">เหลือรับมากกว่า 5,000 บาท/เดือน</p>

<div class="result" id="result"></div>

</section>

<button onclick="resetForm()" class="resetBtn">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>
